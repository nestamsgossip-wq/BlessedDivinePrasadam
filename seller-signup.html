<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🕉 Become a Seller</h1>
</header>

<div class="card" style="max-width:500px;margin:30px auto;">

    <input type="text" placeholder="Temple / Business Name" style="width:100%;padding:10px;margin:10px 0;">

    <input type="text" placeholder="Owner Name" style="width:100%;padding:10px;margin:10px 0;">

    <input type="email" placeholder="Email Address" style="width:100%;padding:10px;margin:10px 0;">

    <input type="text" placeholder="Phone Number" style="width:100%;padding:10px;margin:10px 0;">

    <textarea placeholder="Describe your products"
    style="width:100%;padding:10px;height:100px;margin:10px 0;"></textarea>

    <button style="width:100%;padding:12px;">
        Submit for Approval
    </button>

    <p style="margin-top:15px;">
        Seller accounts require admin approval.
    </p>

</div>

</body>
</html>
